<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HueX - Iniciar Sesión</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            text-align: center;
            z-index: 10;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .btn-submit {
            width: 100%;
            margin-top: 1rem;
        }

        #error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            display: none;
        }

        /* Go back link */
        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-link">
        ← Volver al inicio
    </a>

    <div class="glass-panel auth-container animate-fade-in">
        <a href="index.html" class="logo">HueX</a>
        <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Bienvenido de nuevo</h2>
        <p style="font-size: 0.875rem; margin-bottom: 2rem;">Accede a tu cuenta para ver tus colores guardados.</p>

        <div id="error-message"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="usuario@huex.com" required
                    autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required
                    autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary btn-submit" id="submit-btn">
                Iniciar Sesión
            </button>
        </form>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
